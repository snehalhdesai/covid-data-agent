<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COVID Data Agent</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #fff; height: 100vh; display: flex; flex-direction: column; }
header { padding: 16px 24px; background: #1a1d27; border-bottom: 1px solid #2d2f3e; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 18px; font-weight: 600; color: #fff; }
header span { font-size: 12px; color: #6b7280; }
#chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.msg { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
.user-wrap { display: flex; justify-content: flex-end; }
.agent-wrap { display: flex; justify-content: flex-start; }
.user { background: #2563eb; color: white; border-radius: 12px 12px 2px 12px; }
.agent { background: #1a1d27; color: #e5e7eb; border: 1px solid #2d2f3e; border-radius: 12px 12px 12px 2px; }
.log { font-size: 11px; color: #6b7280; margin-top: 6px; font-family: monospace; background: #0f1117; padding: 6px 10px; border-radius: 6px; }
.typing { display: flex; gap: 4px; padding: 12px 16px; background: #1a1d27; border: 1px solid #2d2f3e; border-radius: 12px; width: fit-content; }
.dot { width: 6px; height: 6px; background: #6b7280; border-radius: 50%; animation: bounce 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
footer { padding: 16px 24px; background: #1a1d27; border-top: 1px solid #2d2f3e; display: flex; gap: 10px; }
#input { flex: 1; background: #0f1117; border: 1px solid #2d2f3e; color: #fff; padding: 12px 16px; border-radius: 8px; font-size: 14px; outline: none; }
#input:focus { border-color: #2563eb; }
button { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; }
#askBtn { background: #2563eb; color: white; }
#askBtn:hover { background: #1d4ed8; }
#resetBtn { background: #1a1d27; color: #9ca3af; border: 1px solid #2d2f3e; }
#resetBtn:hover { color: #fff; }
</style>
</head>
<body>
<header>
  <h1>🤖 COVID Data Agent</h1>
  <span id="status">Ready</span>
</header>
<div id="chat">
  <div class="agent-wrap"><div class="msg agent">Hello! Ask me anything about US COVID-19 data — hospitalizations, cases, deaths by state and date.</div></div>
</div>
<footer>
  <input id="input" type="text" placeholder="e.g. Which 5 states had the most deaths?" onkeypress="if(event.key==='Enter') ask()">
  <button id="askBtn" onclick="ask()">Ask</button>
  <button id="resetBtn" onclick="reset()">Reset</button>
</footer>
<script>
function ask() {
    const input = document.getElementById("input");
    const q = input.value.trim();
    if (!q) return;
    input.value = "";
    appendMsg("user", q);
    const typing = appendTyping();
    document.getElementById("status").textContent = "Thinking...";
    fetch("/ask", {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({question: q})})
    .then(r => r.json())
    .then(d => {
        typing.remove();
        document.getElementById("status").textContent = "Ready";
        let html = d.answer;
        if (d.logs && d.logs.length > 0) {
            html += '<div class="log">🔧 ' + d.logs.map(l => l.function + "(" + JSON.stringify(l.args) + ")").join(" → ") + "</div>";
        }
        appendMsg("agent", html, true);
    });
}
function reset() {
    fetch("/reset", {method:"POST"}).then(() => {
        document.getElementById("chat").innerHTML = '<div class="agent-wrap"><div class="msg agent">Thread reset. Start a new conversation!</div></div>';
    });
}
function appendMsg(role, content, isHtml=false) {
    const chat = document.getElementById("chat");
    const wrap = document.createElement("div");
    wrap.className = role + "-wrap";
    const msg = document.createElement("div");
    msg.className = "msg " + role;
    if (isHtml) msg.innerHTML = content;
    else msg.textContent = content;
    wrap.appendChild(msg);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
}
function appendTyping() {
    const chat = document.getElementById("chat");
    const wrap = document.createElement("div");
    wrap.className = "agent-wrap";
    wrap.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
}
</script>
</body>
</html>
